server:
  port: 9000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sso_db
    username: ${DB_USER:sso_user}
    password: ${DB_PASS:sso_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  issuer-base-url: ${ISSUER_BASE_URL:http://localhost:9000}
